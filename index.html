<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>GitHub Preview</title>
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <main class="app stack">
            <div class="stack">
                <h1>GitHub Preview</h1>
                <p class="hint">Paste a raw GitHub URL or a GitHub blob URL.</p>
            </div>

            <form id="preview-form" class="stack">
                <input
                    id="url"
                    class="field"
                    type="url"
                    placeholder="https://raw.githubusercontent.com/user/repo/refs/heads/main/path/to/index.html"
                    autofocus
                    required
                />
                <button class="button" type="submit">Preview</button>
            </form>

            <section class="stack">
                <h2>Examples</h2>
                <div id="examples" class="stack">
                    <button
                        class="example"
                        type="button"
                        data-url="https://github.com/twbs/bootstrap/blob/0d0ca30f5db73cceb456597c78b3c8750263c2d5/2.3.2/index.html"
                    >
                        Bootstrap's homepage (blob)
                    </button>
                    <button
                        class="example"
                        type="button"
                        data-url="https://raw.githubusercontent.com/PRO-2684/GitHub-Preview/refs/heads/main/examples/fetch/index.html"
                    >
                        Example fetch (raw)
                    </button>
                </div>
            </section>
        </main>

        <script src="./app.js"></script>
    </body>
</html>
