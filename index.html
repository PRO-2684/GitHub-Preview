<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>GitHub Preview</title>
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <main class="app stack">
            <div class="stack">
                <h1>GitHub Preview</h1>
                <p>Preview HTML files directly from GitHub without cloning.</p>
            </div>

            <form id="preview-form" class="stack">
                <input
                    id="url"
                    class="field"
                    type="url"
                    placeholder="https://raw.githubusercontent.com/user/repo/refs/heads/main/path/to/index.html"
                    autofocus
                    required
                />
                <button class="button" type="submit">Preview</button>
            </form>

            <section class="stack">
                <h2>Usage</h2>
                <p>
                    <strong>Input:</strong> paste a GitHub raw or blob URL and
                    preview it.
                </p>
                <p>
                    <strong>Replace:</strong> append the thing after
                    <code>raw.githubusercontent.com</code> to current URL.
                </p>
            </section>

            <section class="stack" id="examples">
                <h2>Examples</h2>
                <button
                    class="example"
                    type="button"
                    data-url="https://github.com/twbs/bootstrap/blob/0d0ca30f5db73cceb456597c78b3c8750263c2d5/2.3.2/index.html"
                >
                    Bootstrap's homepage (blob)
                </button>
                <button
                    class="example"
                    type="button"
                    data-url="https://raw.githubusercontent.com/PRO-2684/GitHub-Preview/refs/heads/main/examples/index.html"
                >
                    Comprehensive Example (raw)
                </button>
            </section>

            <footer class="hint">
                By <a href="https://github.com/PRO-2684/">PRO-2684</a> |
                Contribute on
                <a href="https://github.com/PRO-2684/GitHub-Preview/">GitHub</a>
            </footer>
        </main>

        <script src="./app.js"></script>
    </body>
</html>
